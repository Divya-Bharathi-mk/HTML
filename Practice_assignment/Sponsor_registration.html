<!DOCTYPE html>
<html>
    <head>
        <title>Sponsor Registration</title>
    </head>
    <body>
        <h1>Sponsor Registration</h1>

        <label>Prefix</label>
        <input type="text" /><br><br>

        <label>Name</label>
        <input type="text" placeholder="First Name"/>
        <input type="text" placeholder="Last Name"/><br><br>

        <label>Preferred Pronouns</label>
        <input type="text"/><br><br>

        <label>Email</label>
        <input type="email" placeholder="sameple@example.com"/><br><br>

        <label>Work phone</label>
        <input type="tel"/><br><br>

        <label>Cell phone</label>
        <input type="tel"/><br><br>

        <label>Job Title/label>
        <input type="text"/><br><br>

        <label>Company</label>
        <input type="text"/><br><br>

        <label>Full Business Address</label><br>
        <input type="text"/><br><br>

        <label>Company Website</label><br>
        <input type="url"/><br><br>

        
        <label>Company Description</label><br>
        <input type="text"/><br><br>

        
        <label>Company Facebook Page</label><br>
        <input type="url"/><br><br>

        <label>Company Twitter Handle</label><br>
        <input type="url"/><br><br>

        <label>Company LinkedIn Handle</label><br>
        <input type="url"/><br><br>

        <label>Sponsorship Level</label><br>
        <input type="radio"/>
        <label>Gold</label><br>
        <input type="radio"/>
        <label>Diamond</label><br>
        <input type="radio"/>
        <label>Platinum</label><br><br>

        <label>Additional Guests (name,email)</label>
        <input  type="text"/>


    </body>
</html>
